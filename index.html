<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Card Ledger">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<title>Card Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;
  --bg2:#13131a;
  --bg3:#1c1c26;
  --border:#ffffff12;
  --border2:#ffffff20;
  --text:#f0f0f5;
  --text2:#8888a0;
  --text3:#55556a;
  --green:#00d97e;
  --green-dim:#00d97e22;
  --green-border:#00d97e40;
  --red:#ff4d6a;
  --amber:#ffb800;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:var(--sans);background:var(--bg)}
#app{max-width:430px;margin:0 auto;height:100%;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden}

/* pages */
.page{display:none;flex-direction:column;flex:1;overflow:hidden}
.page.active{display:flex}

/* header */
.page-header{padding:max(80px,calc(env(safe-area-inset-top)+60px)) 20px 16px;flex-shrink:0;border-bottom:1px solid var(--border)}
.page-label{font-size:11px;color:var(--green);letter-spacing:3px;font-family:var(--mono);margin-bottom:4px}
.page-title{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-.4px}

/* scroll */
.scroll{flex:1;overflow-y:auto;padding:16px 20px;padding-bottom:calc(100px + env(safe-area-inset-bottom));scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}

/* card blocks */
.card-block{width:100%;text-align:left;background:none;border:none;cursor:pointer;margin-bottom:10px;padding:0;display:block}
.card-inner{border-radius:14px;overflow:hidden;border:1px solid var(--border2);background:var(--bg2);transition:border-color .15s}
.card-block:active .card-inner{border-color:var(--green-border)}
.card-body{padding:18px 20px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.card-name{font-size:12px;font-weight:500;color:var(--text2);letter-spacing:1.5px;font-family:var(--mono);margin-bottom:6px;text-transform:uppercase}
.card-amount{font-size:28px;font-weight:600;color:var(--text);letter-spacing:-.5px;line-height:1;font-family:var(--mono)}
.card-amount-sub{font-size:12px;font-weight:400;color:var(--text3);margin-left:6px}
.card-badge{text-align:right;font-size:12px;font-family:var(--mono);background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;line-height:1.8}
.card-badge-label{color:var(--text2)}
.card-badge-days{font-weight:600;color:var(--text)}
.bar-row{margin-bottom:8px}
.bar-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px;font-family:var(--mono)}
.bar-track{height:2px;border-radius:2px;background:var(--border2)}
.bar-fill{height:100%;border-radius:2px;background:var(--green)}
.card-footer{font-size:11px;color:var(--text3);margin-top:14px;padding-top:12px;border-top:1px solid var(--border);font-family:var(--mono);display:flex;justify-content:space-between}

/* bottom nav */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;padding:12px 0;padding-bottom:calc(16px + env(safe-area-inset-bottom))}
.nav-btn{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 0;font-family:var(--sans);color:var(--text3);transition:color .15s}
.nav-btn.active{color:var(--green)}
.nav-icon{font-size:18px;line-height:1}
.nav-label{font-size:11px;letter-spacing:1.5px;font-family:var(--mono);text-transform:uppercase}

/* detail */
.detail-header{flex-shrink:0}
.back-btn{background:none;border:none;cursor:pointer;font-size:13px;font-family:var(--mono);color:var(--text2);display:flex;align-items:center;gap:6px;padding:max(80px,calc(env(safe-area-inset-top)+60px)) 20px 0;transition:color .15s}
.back-btn:active{color:var(--green)}
.section-label{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;font-family:var(--mono)}
.record-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.record-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.record-info{flex:1;min-width:0}
.record-note{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.record-sub{font-size:12px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.record-amount{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;font-family:var(--mono)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:4px;flex-shrink:0;transition:color .15s}
.del-btn:active{color:var(--red)}

/* add / form */
.field{margin-bottom:18px}
.field-label{font-size:11px;color:var(--text3);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:8px;font-family:var(--mono)}
.tag-row{display:flex;flex-wrap:wrap;gap:7px}
.tag{padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--mono);transition:all .12s;background:var(--bg2);border:1px solid var(--border2);color:var(--text2)}
.tag.active{background:var(--green-dim);border-color:var(--green-border);color:var(--green)}
.input-row{display:flex;gap:8px}
.inp{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--text);font-family:var(--mono);outline:none;-webkit-appearance:none;transition:border-color .15s;caret-color:var(--green)}
.inp:focus{border-color:var(--green-border)}
.inp option{background:var(--bg2)}
.inp-amount{font-size:26px;font-weight:600;flex:1}
.inp-ccy{width:82px;font-size:13px}
.submit-btn{width:100%;padding:15px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--sans);margin-top:6px;transition:all .2s;background:var(--green);border:none;color:#000}
.submit-btn:active{opacity:.85}
.submit-btn.success{background:var(--bg3);border:1px solid var(--green-border);color:var(--green)}
.dashed-btn{width:100%;padding:13px;border-radius:10px;background:none;border:1px dashed var(--border2);color:var(--text3);font-size:14px;cursor:pointer;font-family:var(--sans);transition:border-color .15s}
.dashed-btn:active{border-color:var(--green-border);color:var(--green)}

/* manage */
.manage-card-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:10px;margin-bottom:8px;background:var(--bg2);border:1px solid var(--border2)}
.edit-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:5px 12px;font-size:11px;color:var(--text2);cursor:pointer;font-family:var(--mono);transition:all .15s}
.edit-btn:active{border-color:var(--green-border);color:var(--green)}

/* swatches */
.swatch{width:32px;height:32px;border-radius:8px;cursor:pointer;padding:0;flex-shrink:0;transition:transform .12s}
.swatch:active{transform:scale(.92)}

/* modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:flex-end;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:430px;margin:0 auto;padding:24px 20px;padding-bottom:calc(24px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto;border-top:1px solid var(--border2)}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:20px}

/* stat detail */
.stat-bar-row{margin-bottom:14px}
.stat-bar-label{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:6px;font-family:var(--mono)}
.stat-bar-track{height:4px;border-radius:3px;background:var(--border2)}
.stat-bar-fill{height:100%;border-radius:3px;background:var(--green)}

/* empty */
.empty{text-align:center;color:var(--text3);margin-top:80px;font-size:13px;font-family:var(--mono);line-height:2}

/* pill badge */
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-family:var(--mono)}
.pill-green{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)}
.pill-red{background:#ff4d6a18;color:var(--red);border:1px solid #ff4d6a30}
.pill-amber{background:#ffb80018;color:var(--amber);border:1px solid #ffb80030}
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="page-header">
      <div class="page-label">CARD LEDGER</div>
      <div class="page-title">本期账单</div>
    </div>
    <div class="scroll" id="home-scroll"></div>
    <div class="bottom-nav">
      <button class="nav-btn active" onclick="showPage('home')"><span class="nav-icon">◈</span><span class="nav-label">总览</span></button>
      <button class="nav-btn" onclick="showPage('add')"><span class="nav-icon" style="font-size:22px;font-weight:300">+</span><span class="nav-label">记账</span></button>
      <button class="nav-btn" onclick="showPage('manage')"><span class="nav-icon">⊟</span><span class="nav-label">卡片</span></button>
    </div>
  </div>

  <!-- DETAIL -->
  <div class="page" id="page-detail">
    <div class="detail-header" id="detail-header-area"></div>
    <div class="scroll" id="detail-scroll"></div>
  </div>

  <!-- ADD -->
  <div class="page" id="page-add">
    <div class="page-header">
      <div class="page-label">NEW RECORD</div>
      <div class="page-title">记一笔</div>
    </div>
    <div class="scroll">
      <div class="field">
        <div class="field-label">使用哪张卡</div>
        <div class="tag-row" id="card-tags"></div>
      </div>
      <div class="field">
        <div class="field-label">金额</div>
        <div class="input-row">
          <input class="inp inp-amount" type="number" inputmode="decimal" placeholder="0" id="inp-amount">
          <select class="inp inp-ccy" id="inp-ccy">
            <option>JPY</option><option>CNY</option><option>USD</option><option>EUR</option>
          </select>
        </div>
      </div>
      <div class="field">
        <div class="field-label">分类</div>
        <div class="tag-row" id="cat-tags"></div>
      </div>
      <div class="field">
        <div class="field-label">日期</div>
        <input class="inp" type="date" id="inp-date">
      </div>
      <div class="field">
        <div class="field-label">备注</div>
        <input class="inp" type="text" placeholder="在哪花的？" id="inp-note">
      </div>
      <button class="submit-btn" id="submit-btn" onclick="addRecord()">记一笔</button>
    </div>
    <div class="bottom-nav">
      <button class="nav-btn" onclick="showPage('home')"><span class="nav-icon">◈</span><span class="nav-label">总览</span></button>
      <button class="nav-btn active" onclick="showPage('add')"><span class="nav-icon" style="font-size:22px;font-weight:300">+</span><span class="nav-label">记账</span></button>
      <button class="nav-btn" onclick="showPage('manage')"><span class="nav-icon">⊟</span><span class="nav-label">卡片</span></button>
    </div>
  </div>

  <!-- MANAGE -->
  <div class="page" id="page-manage">
    <div class="page-header">
      <div class="page-label">SETTINGS</div>
      <div class="page-title">我的卡片</div>
    </div>
    <div class="scroll" id="manage-scroll"></div>
    <div class="bottom-nav">
      <button class="nav-btn" onclick="showPage('home')"><span class="nav-icon">◈</span><span class="nav-label">总览</span></button>
      <button class="nav-btn" onclick="showPage('add')"><span class="nav-icon" style="font-size:22px;font-weight:300">+</span><span class="nav-label">记账</span></button>
      <button class="nav-btn active" onclick="showPage('manage')"><span class="nav-icon">⊟</span><span class="nav-label">卡片</span></button>
    </div>
  </div>

</div>

<!-- Card modal -->
<div class="modal-overlay" id="card-modal" onclick="closeCardModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">添加卡片</div>
    <div class="field">
      <div class="field-label">卡片名称</div>
      <input class="inp" type="text" placeholder="如：楽天カード" id="cf-name">
    </div>
    <div class="field">
      <div class="field-label">还款日（每月几号）</div>
      <input class="inp" type="number" inputmode="numeric" min="1" max="31" placeholder="27" id="cf-day">
    </div>
    <div class="field">
      <div class="field-label">默认货币</div>
      <div class="tag-row" id="cf-ccy-tags"></div>
    </div>
    <div class="field">
      <div class="field-label">卡片颜色</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap" id="cf-swatches"></div>
      <div id="cf-preview" style="margin-top:12px"></div>
    </div>
    <button class="submit-btn" id="cf-submit" onclick="saveCard()">添加卡片</button>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const CATEGORIES=[
  {id:"food",label:"餐饮",icon:"🍜"},
  {id:"transport",label:"交通",icon:"🚃"},
  {id:"shopping",label:"购物",icon:"🛍"},
  {id:"grocery",label:"超市",icon:"🛒"},
  {id:"entertainment",label:"娱乐",icon:"🎬"},
  {id:"health",label:"医疗",icon:"💊"},
  {id:"subscription",label:"订阅",icon:"📱"},
  {id:"travel",label:"旅行",icon:"✈️"},
  {id:"other",label:"其他",icon:"•"},
];
const CURRENCIES=["JPY","CNY","USD","EUR"];
const CCY={JPY:"¥",CNY:"¥",USD:"$",EUR:"€"};
const TO_JPY={JPY:1,CNY:20,USD:150,EUR:165};

// card accent colors — used as left-border / dot only, bg stays dark
const CARD_ACCENTS=[
  {accent:"#00d97e",name:"绿"},
  {accent:"#3b82f6",name:"蓝"},
  {accent:"#a78bfa",name:"紫"},
  {accent:"#f59e0b",name:"琥珀"},
  {accent:"#f472b6",name:"粉"},
  {accent:"#22d3ee",name:"青"},
];

// ── Persistence ────────────────────────────────────────────────────────────
const DEFAULT_CARDS=[
  {id:"c1",name:"楽天カード",accent:"#00d97e",dueDay:27,currency:"JPY"},
  {id:"c2",name:"招商银行",accent:"#3b82f6",dueDay:5,currency:"CNY"},
];
function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
let cards=load("cl2_cards",DEFAULT_CARDS);
let records=load("cl2_records",[]);
function saveCards(){save("cl2_cards",cards);}
function saveRecords(){save("cl2_records",records);}

// ── Helpers ────────────────────────────────────────────────────────────────
let _rid=Date.now();
const uid=()=>"r"+(_rid++);
function fmtDate(d){return d.toISOString().slice(0,10);}
function today(){return fmtDate(new Date());}
function billingPeriod(dueDay,ref=new Date()){
  const y=ref.getFullYear(),m=ref.getMonth(),d=ref.getDate();
  let ey=y,em=m;
  if(d>dueDay){em++;if(em>11){em=0;ey++;}}
  return{start:new Date(ey,em-1,dueDay+1),end:new Date(ey,em,dueDay)};
}
function inPeriod(s,start,end){const d=new Date(s);return d>=start&&d<=end;}
function daysUntil(end){const n=new Date();n.setHours(0,0,0,0);return Math.round((end-n)/86400000);}
function escHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// ── State ──────────────────────────────────────────────────────────────────
let currentPage="home";
let selectedCardId=null;
let addCardId=null;
let addCat="food";
let editingCardId=null;
let cfCcy="JPY";
let cfAccent=CARD_ACCENTS[0].accent;

// ── Routing ────────────────────────────────────────────────────────────────
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-"+id).classList.add("active");
  currentPage=id;
  if(id==="home")renderHome();
  if(id==="add")renderAdd();
  if(id==="manage")renderManage();
}

// ── HOME ───────────────────────────────────────────────────────────────────
function renderHome(){
  const el=document.getElementById("home-scroll");
  el.innerHTML="";
  if(!cards.length){
    el.innerHTML='<div class="empty">// no cards yet<br>go add one ↓</div>';
    return;
  }

  // ── Summary banner ──
  const allTotal=cards.reduce((sum,card)=>{
    const{start,end}=billingPeriod(card.dueDay);
    const recs=records.filter(r=>r.cardId===card.id&&inPeriod(r.date,start,end));
    return sum+recs.reduce((s,r)=>s+r.amount*TO_JPY[r.currency],0);
  },0);
  const allCount=cards.reduce((sum,card)=>{
    const{start,end}=billingPeriod(card.dueDay);
    return sum+records.filter(r=>r.cardId===card.id&&inPeriod(r.date,start,end)).length;
  },0);
  const byCatAll={};
  cards.forEach(card=>{
    const{start,end}=billingPeriod(card.dueDay);
    records.filter(r=>r.cardId===card.id&&inPeriod(r.date,start,end)).forEach(r=>{
      byCatAll[r.category]=(byCatAll[r.category]||0)+r.amount*TO_JPY[r.currency];
    });
  });
  const topCat=Object.entries(byCatAll).sort((a,b)=>b[1]-a[1])[0];
  const topCatLabel=topCat?CATEGORIES.find(c=>c.id===topCat[0])?.icon+" "+CATEGORIES.find(c=>c.id===topCat[0])?.label:"—";

  const banner=document.createElement("div");
  banner.style.cssText="background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:18px 20px;margin-bottom:16px";
  banner.innerHTML=`
    <div style="font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:2px;margin-bottom:10px">TOTAL THIS PERIOD</div>
    <div style="font-size:36px;font-weight:600;color:var(--green);font-family:var(--mono);letter-spacing:-.5px;line-height:1">¥${Math.round(allTotal).toLocaleString()}</div>
    <div style="font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:6px">JPY est.</div>
    <div style="display:flex;gap:20px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
      <div>
        <div style="font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:1px;margin-bottom:3px">CARDS</div>
        <div style="font-size:16px;font-weight:600;color:var(--text);font-family:var(--mono)">${cards.length}</div>
      </div>
      <div>
        <div style="font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:1px;margin-bottom:3px">RECORDS</div>
        <div style="font-size:16px;font-weight:600;color:var(--text);font-family:var(--mono)">${allCount}</div>
      </div>
      <div>
        <div style="font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:1px;margin-bottom:3px">TOP CAT</div>
        <div style="font-size:16px;font-weight:600;color:var(--text);font-family:var(--mono)">${topCatLabel}</div>
      </div>
    </div>`;
  el.appendChild(banner);

  cards.forEach(card=>{
    const{start,end}=billingPeriod(card.dueDay);
    const recs=records.filter(r=>r.cardId===card.id&&inPeriod(r.date,start,end));
    const total=recs.reduce((s,r)=>s+r.amount*TO_JPY[r.currency],0);
    const byCat={};
    recs.forEach(r=>{byCat[r.category]=(byCat[r.category]||0)+r.amount*TO_JPY[r.currency];});
    const days=daysUntil(end);
    const accent=card.accent||"#00d97e";
    const daysPill=days<=3?'pill-red':days<=7?'pill-amber':'pill-green';
    const daysLabel=days>0?`${days}d`:days===0?'today':'overdue';
    const catEntries=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,4);
    const barsHtml=catEntries.length===0
      ?`<div style="font-size:11px;color:var(--text3);font-family:var(--mono)">// no records this period</div>`
      :catEntries.map(([cid,val])=>{
        const c=CATEGORIES.find(x=>x.id===cid);
        const pct=total>0?val/total:0;
        return`<div class="bar-row">
          <div class="bar-label"><span>${c?.icon} ${c?.label}</span><span>¥${Math.round(val).toLocaleString()} · ${Math.round(pct*100)}%</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct*100}%;background:${accent}"></div></div>
        </div>`;
      }).join("");
    const btn=document.createElement("button");
    btn.className="card-block";
    btn.onclick=()=>showDetail(card.id);
    btn.innerHTML=`<div class="card-inner" style="border-left:3px solid ${accent}">
      <div class="card-body">
        <div class="card-top">
          <div>
            <div class="card-name">${escHtml(card.name)}</div>
            <div class="card-amount" style="color:${accent}">¥${Math.round(total).toLocaleString()}<span class="card-amount-sub">JPY</span></div>
          </div>
          <div style="text-align:right;display:flex;flex-direction:column;gap:6px;align-items:flex-end">
            <span class="pill ${daysPill}">${daysLabel}</span>
            <div style="font-size:10px;color:var(--text3);font-family:var(--mono)">due ${card.dueDay}th</div>
          </div>
        </div>
        ${barsHtml}
        <div class="card-footer">
          <span>${recs.length} records</span>
          <span>${fmtDate(new Date()).slice(5)} – ${fmtDate(end).slice(5)}</span>
        </div>
      </div>
    </div>`;
    el.appendChild(btn);
  });
}

// ── DETAIL ─────────────────────────────────────────────────────────────────
function showDetail(cardId){
  selectedCardId=cardId;
  const card=cards.find(c=>c.id===cardId);
  const{start,end}=billingPeriod(card.dueDay);
  const recs=records.filter(r=>r.cardId===cardId&&inPeriod(r.date,start,end));
  const total=recs.reduce((s,r)=>s+r.amount*TO_JPY[r.currency],0);
  const byCat={};
  recs.forEach(r=>{byCat[r.category]=(byCat[r.category]||0)+r.amount*TO_JPY[r.currency];});
  const days=daysUntil(end);
  const accent=card.accent||"#00d97e";

  document.getElementById("detail-header-area").innerHTML=`
    <button class="back-btn" onclick="showPage('home')">← back</button>
    <div style="padding:16px 20px 20px;border-bottom:1px solid var(--border)">
      <div style="font-size:12px;color:${accent};font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">${escHtml(card.name)}</div>
      <div style="font-size:34px;font-weight:600;color:${accent};font-family:var(--mono);letter-spacing:-.5px">¥${Math.round(total).toLocaleString()}</div>
      <div style="font-size:13px;color:var(--text3);font-family:var(--mono);margin-top:6px">还款日 ${card.dueDay}日 · 剩 ${days} 天</div>
    </div>`;

  const catEntries=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const barsHtml=catEntries.map(([cid,val])=>{
    const c=CATEGORIES.find(x=>x.id===cid);
    const pct=total>0?val/total:0;
    return`<div class="stat-bar-row">
      <div class="stat-bar-label"><span>${c?.icon} ${c?.label}</span><span>¥${Math.round(val).toLocaleString()} · ${Math.round(pct*100)}%</span></div>
      <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct*100}%;background:${accent}"></div></div>
    </div>`;
  }).join("");

  const recRows=[...recs].sort((a,b)=>b.date.localeCompare(a.date)).map(r=>{
    const c=CATEGORIES.find(x=>x.id===r.category);
    return`<div class="record-row">
      <div class="record-icon">${c?.icon}</div>
      <div class="record-info">
        <div class="record-note">${escHtml(r.note||c?.label||"")}</div>
        <div class="record-sub">${c?.label} · ${r.date.slice(5).replace("-","/")} · ${r.currency}</div>
      </div>
      <div class="record-amount">${CCY[r.currency]}${r.amount.toLocaleString()}</div>
      <button class="del-btn" onclick="deleteRecord('${r.id}')">✕</button>
    </div>`;
  }).join("");

  document.getElementById("detail-scroll").innerHTML=`
    <div class="section-label">分类统计</div>
    ${barsHtml||'<p style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:16px">// no data</p>'}
    <div class="section-label" style="margin-top:24px">消费明细</div>
    ${recRows||'<p style="font-size:11px;color:var(--text3);font-family:var(--mono)">// no records</p>'}`;

  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-detail").classList.add("active");
  currentPage="detail";
}

function deleteRecord(id){
  records=records.filter(r=>r.id!==id);
  saveRecords();
  showDetail(selectedCardId);
}

// ── ADD ────────────────────────────────────────────────────────────────────
function renderAdd(){
  if(!addCardId||!cards.find(c=>c.id===addCardId))addCardId=cards[0]?.id||null;

  const tagRow=document.getElementById("card-tags");
  tagRow.innerHTML="";
  cards.forEach(card=>{
    const active=addCardId===card.id;
    const btn=document.createElement("button");
    btn.className="tag"+(active?" active":"");
    if(active)btn.style.borderColor=card.accent;
    if(active)btn.style.color=card.accent;
    if(active)btn.style.background=card.accent+"18";
    btn.textContent=card.name;
    btn.onclick=()=>{addCardId=card.id;document.getElementById("inp-ccy").value=card.currency;renderAdd();};
    tagRow.appendChild(btn);
  });

  const catGrid=document.getElementById("cat-tags");
  catGrid.innerHTML="";
  const selCard=cards.find(c=>c.id===addCardId);
  const accent=selCard?.accent||"#00d97e";
  CATEGORIES.forEach(c=>{
    const active=addCat===c.id;
    const btn=document.createElement("button");
    btn.className="tag"+(active?" active":"");
    if(active){btn.style.borderColor=accent;btn.style.color=accent;btn.style.background=accent+"18";}
    btn.textContent=c.icon+" "+c.label;
    btn.onclick=()=>{addCat=c.id;renderAdd();};
    catGrid.appendChild(btn);
  });

  if(!document.getElementById("inp-date").value)document.getElementById("inp-date").value=today();
  if(selCard)document.getElementById("inp-ccy").value=selCard.currency;

  const btn=document.getElementById("submit-btn");
  btn.className="submit-btn";
  btn.textContent="记一笔";
  btn.style.background=accent;
  btn.style.color=accent==="#ffb800"?"#000":"#000";
}

function addRecord(){
  const amount=parseFloat(document.getElementById("inp-amount").value);
  if(!amount||isNaN(amount)||!addCardId)return;
  const ccy=document.getElementById("inp-ccy").value;
  const date=document.getElementById("inp-date").value||today();
  const note=document.getElementById("inp-note").value.trim();
  records.push({id:uid(),cardId:addCardId,date,amount,currency:ccy,category:addCat,note});
  saveRecords();
  document.getElementById("inp-amount").value="";
  document.getElementById("inp-note").value="";
  const btn=document.getElementById("submit-btn");
  btn.className="submit-btn success";
  btn.textContent="✓ 已记录";
  setTimeout(()=>renderAdd(),1000);
}

// ── MANAGE ─────────────────────────────────────────────────────────────────
function renderManage(){
  const el=document.getElementById("manage-scroll");
  el.innerHTML="";
  cards.forEach(card=>{
    const accent=card.accent||"#00d97e";
    const row=document.createElement("div");
    row.className="manage-card-row";
    row.style.borderLeft=`3px solid ${accent}`;
    row.innerHTML=`
      <div style="flex:1;min-width:0">
        <div style="font-size:15px;font-weight:500;color:var(--text)">${escHtml(card.name)}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:3px;font-family:var(--mono)">due ${card.dueDay}th · ${card.currency}</div>
      </div>
      <button class="edit-btn" onclick="openCardModal('${card.id}')">编辑</button>
      <button class="del-btn" onclick="deleteCard('${card.id}')">✕</button>`;
    el.appendChild(row);
  });
  const addBtn=document.createElement("button");
  addBtn.className="dashed-btn";
  addBtn.textContent="+ 添加新卡片";
  addBtn.onclick=()=>openCardModal(null);
  el.appendChild(addBtn);
}

function deleteCard(id){
  if(!confirm("删除该卡片及其所有记录？"))return;
  cards=cards.filter(c=>c.id!==id);
  records=records.filter(r=>r.cardId!==id);
  saveCards();saveRecords();
  renderManage();
}

// ── CARD MODAL ─────────────────────────────────────────────────────────────
function openCardModal(cardId){
  editingCardId=cardId;
  const card=cardId?cards.find(c=>c.id===cardId):null;
  document.getElementById("modal-title").textContent=card?"编辑卡片":"添加卡片";
  document.getElementById("cf-submit").textContent=card?"保存修改":"添加卡片";
  document.getElementById("cf-name").value=card?.name||"";
  document.getElementById("cf-day").value=card?.dueDay||27;
  cfCcy=card?.currency||"JPY";
  cfAccent=card?.accent||CARD_ACCENTS[0].accent;
  renderModalForm();
  document.getElementById("card-modal").classList.add("open");
}

function closeCardModal(e){
  if(e.target===document.getElementById("card-modal"))
    document.getElementById("card-modal").classList.remove("open");
}

function renderModalForm(){
  const ccyRow=document.getElementById("cf-ccy-tags");
  ccyRow.innerHTML="";
  CURRENCIES.forEach(c=>{
    const active=cfCcy===c;
    const btn=document.createElement("button");
    btn.className="tag"+(active?" active":"");
    btn.textContent=c;
    btn.onclick=()=>{cfCcy=c;renderModalForm();};
    ccyRow.appendChild(btn);
  });

  const sw=document.getElementById("cf-swatches");
  sw.innerHTML="";
  CARD_ACCENTS.forEach(a=>{
    const btn=document.createElement("button");
    btn.className="swatch";
    btn.style.cssText=`background:${a.accent}18;border:${cfAccent===a.accent?`2px solid ${a.accent}`:"1px solid #ffffff15"}`;
    btn.innerHTML=`<span style="display:block;width:14px;height:14px;border-radius:50%;background:${a.accent};margin:auto"></span>`;
    btn.onclick=()=>{cfAccent=a.accent;renderModalForm();};
    sw.appendChild(btn);
  });

  const prev=document.getElementById("cf-preview");
  const name=document.getElementById("cf-name").value||"预览";
  prev.innerHTML=`<div style="padding:12px 16px;border-radius:10px;background:var(--bg3);border:1px solid var(--border2);border-left:3px solid ${cfAccent}">
    <div style="font-size:10px;color:${cfAccent};font-family:var(--mono);letter-spacing:1px;text-transform:uppercase">${escHtml(name)}</div>
  </div>`;
}

document.getElementById("cf-name").addEventListener("input",()=>{
  if(document.getElementById("card-modal").classList.contains("open"))renderModalForm();
});

function saveCard(){
  const name=document.getElementById("cf-name").value.trim();
  const day=parseInt(document.getElementById("cf-day").value)||27;
  if(!name)return;
  if(editingCardId){
    cards=cards.map(c=>c.id===editingCardId?{...c,name,dueDay:day,currency:cfCcy,accent:cfAccent}:c);
  }else{
    cards.push({id:"c"+Date.now(),name,dueDay:day,currency:cfCcy,accent:cfAccent});
  }
  saveCards();
  document.getElementById("card-modal").classList.remove("open");
  renderManage();
}

// ── Init ───────────────────────────────────────────────────────────────────
renderHome();
renderAdd();

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
